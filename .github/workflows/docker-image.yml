name: Docker Image CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build the Docker image
        run: |
          docker build . --file Dockerfile \
            --tag ghcr.io/neidi387/neidi387-portfolio-sveltekit:${{ github.sha }} \
            --tag ghcr.io/neidi387/neidi387-portfolio-sveltekit:latest

      - name: Push to GitHub Container Registry
        if: github.event_name == 'push'
        run: |
          docker push ghcr.io/neidi387/neidi387-portfolio-sveltekit:${{ github.sha }}
          docker push ghcr.io/neidi387/neidi387-portfolio-sveltekit:latest
